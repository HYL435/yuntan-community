services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 766498
      MYSQL_DATABASE: yuntan_db
      MYSQL_USER: yuntan
      MYSQL_PASSWORD: 766498
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql      # Docker 卷管理
      - ../data/mysql:/var/lib/mysql   # 本地挂载，开发可直接访问
    networks:
      - yuntan-network
    restart: unless-stopped

  redis:
    image: redis:8.4
    container_name: redis
    ports:
      - "6405:6379"
    volumes:
      - redis_data:/data
      - ../data/redis:/data
    networks:
      - yuntan-network
    restart: unless-stopped

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.12
    container_name: es
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=766498
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ../data/es:/usr/share/elasticsearch/data
    networks:
      - yuntan-network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.12
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200
      - ELASTIC_PASSWORD=766498
    ports:
      - "5601:5601"
    depends_on:
      - es
    networks:
      - yuntan-network
    restart: unless-stopped

