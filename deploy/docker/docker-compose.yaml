  nginx:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
    container_name: nginx
    volumes:
      - E:/Docker/yuntan-community/frontend/dist:/usr/share/nginx/html
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    networks:
      - yuntan-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local

networks:
  yuntan-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16