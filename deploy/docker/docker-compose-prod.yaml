services:
  # ======================
  # MySQL
  # ======================
  mysql:
    image: mysql:8.0.36
    container_name: mysql
    env_file:
      - .env
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ../data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    networks:
      - yuntan-network
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m

  # ======================
  # Redis
  # ======================
  redis:
    image: redis:8.4
    container_name: redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - ../data/redis:/data
    networks:
      - yuntan-network
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 256m

  # ======================
  # Elasticsearch
  # ======================
  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.12
    container_name: es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ../data/es:/usr/share/elasticsearch/data
    networks:
      - yuntan-network
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 768m

  # ======================
  # Python AI 服务
  # ======================
  ai-service:
    build:
      context: ../../ai-service
      dockerfile: Dockerfile.prod
    container_name: ai-service
    volumes:
      - ../data:/data
    ports:
      - "${AI_PORT}:5000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mysql
      - redis
    networks:
      - yuntan-network
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m

  # ======================
  # Spring Boot 后端
  # ======================
  backend:
    build:
      context: ../../
      dockerfile: backend/yuntan-monolith-app/Dockerfile.prod
    container_name: backend
    volumes:
      - ../data:/data
    ports:
      - "${SPRING_PORT}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=http://es:9200
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/data/logs
    depends_on:
      - mysql
      - redis
      - es
    networks:
      - yuntan-network
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m

  # ======================
  # Nginx
  # ======================
  nginx:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - yuntan-network
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m

# ======================
# 网络配置
# ======================
networks:
  yuntan-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16